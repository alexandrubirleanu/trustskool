name: Skool data refresh

on:
  schedule:
    - cron: "17 4 * * *"  # once a day, off-peak UTC
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Community-level refresh, tiered by popularity (member count), not language.
      # Tier A (>=2,000 members) refreshed every run. Tier B/C are rotating slices
      # sized so the whole tier cycles within 7-14 days / 30-45 days respectively
      # (see TIER_B_SLICE_SIZE/TIER_C_SLICE_SIZE below). Sends an email alert via
      # Resend (RESEND_API_KEY/ALERT_EMAIL secrets) instead of silently falling
      # behind if the dataset has grown faster than these slice sizes can cover.
      - name: Refresh by popularity tier (A daily, B/C rotating slices)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TIER_B_SLICE_SIZE: "250"
          TIER_C_SLICE_SIZE: "170"
        run: python3 scripts/refresh_by_popularity.py all

      # Discovery pass: finds NEW communities and updates Skool's own trending-rank
      # position (only available from the /discovery listing, not /about pages).
      # Runs every 3 days (day-of-year % 3 == 0), not daily — it's a broader/slower
      # pass than the popularity refresh above, and its job is discovery + rank
      # tracking, not day-to-day stat freshness for known communities.
      - name: New-community discovery + expansion pass (every 3 days)
        run: |
          if [ "$(( $(date +%j) % 3 ))" = "0" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running discovery pass"
            python3 scripts/scrape_skool_discovery.py --refresh --tier-a
            BUCKET=$(( $(date +%j) % 3 ))
            python3 scripts/scrape_skool_discovery.py --refresh --tier-b-bucket $BUCKET --tier-b-buckets 3
            echo "Running category-expansion pass for capped languages (english/german/spanish/french)"
            python3 scripts/scrape_skool_discovery.py --expand english german spanish french
          else
            echo "Not a discovery-pass day, skipping (popularity-tier refresh above still ran)"
          fi

      # Owner activity pass: fetches each known owner's @handle profile (portfolio
      # of communities they run + real activity signals - last-active timestamp,
      # days active in the last 30/90, lifetime contribution count). An owner who's
      # still actively posting is a verifiable signal the community isn't abandoned.
      # Capped per run (PORTFOLIO_BATCH_SIZE) and skips already-fetched handles, so
      # a large backlog catches up incrementally across several days rather than
      # one very long run.
      - name: Owner activity pass (portfolio + engagement signals, incremental)
        env:
          PORTFOLIO_BATCH_SIZE: "300"
        run: python3 scripts/scrape_owner_profiles.py --portfolio-only

      - name: Rebuild data/communities.json (embeds history + owner badge/affiliate data)
        run: python3 scripts/build_communities_dataset.py

      - name: Commit updated snapshots and dataset
        run: |
          git config user.name "trustskool-bot"
          git config user.email "actions@users.noreply.github.com"
          # Stage the whole skool_data/ tree, not an explicit subset: the discovery
          # + expansion pass above (--refresh/--expand) overwrites per-language base
          # files (scripts/skool_data/<lang>.jsonl + .done markers) directly, not
          # just history/. An incomplete git-add list here left those modified but
          # unstaged, which made the later `git rebase origin/main` refuse to even
          # start ("cannot rebase: you have unstaged changes") - confirmed as the
          # actual cause of the 2026-07-19 workflow_dispatch failure, and it would
          # have hit every real discovery-pass day (day-of-year % 3 == 0) too.
          git add scripts/skool_data/ data/communities.json
          git diff --cached --quiet || git commit -m "Daily Skool data refresh $(date -u +%Y-%m-%d)"
          # The run above can take hours (network-bound scraping); other pushes to
          # main (my own manual work, MANUS's app commits) routinely land during
          # that window. A bare `git push` here is a near-guaranteed non-fast-forward
          # rejection in an actively-developed repo — confirmed as the actual cause
          # of both historical run failures (2026-07-19 audit). Rebase onto whatever
          # is now on main before pushing, retrying a few times in case of a race
          # on the retry itself.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "Pushed on attempt $attempt"
                break
              fi
            else
              git rebase --abort
            fi
            if [ "$attempt" = "5" ]; then
              echo "::error::Failed to push after 5 attempts (persistent conflict or push rejection)"
              exit 1
            fi
            echo "Push attempt $attempt failed, retrying after backoff..."
            sleep $(( attempt * 10 ))
          done

      - name: Trigger app ingestion
        if: env.INGEST_URL != ''
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
        run: curl -fsS -X POST "$INGEST_URL" || echo "Ingestion trigger failed (non-fatal, daily Heartbeat cron will pick it up)"
